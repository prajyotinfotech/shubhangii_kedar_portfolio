<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shubhangii Kedar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@700;800&family=Quicksand:wght@700&family=Comfortaa:wght@700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Netlify Forms: hidden booking form so Netlify can detect the form at build time -->
    <form name="booking" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="booking" />
      <p class="hidden"><label>Don’t fill this out: <input name="bot-field" /></label></p>
      <input name="fullName" />
      <input name="email" type="email" />
      <input name="phone" />
      <textarea name="message"></textarea>
    </form>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
