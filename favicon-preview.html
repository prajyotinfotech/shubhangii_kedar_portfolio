<!DOCTYPE html>
<html>
<body style="background:#333; display:flex; gap:20px; padding:40px; align-items:center; flex-wrap:wrap;">

  <div>
    <p style="color:white; font-size:12px; margin-bottom:8px;">Option 1 — Script Unicode (𝒮𝒦)</p>
    <svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 64 64">
      <defs>
        <radialGradient id="g1" cx="50%" cy="50%" r="60%">
          <stop offset="0%" stop-color="#1DB954" stop-opacity="0.2"/>
          <stop offset="100%" stop-color="#191414" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <rect width="64" height="64" rx="32" fill="#191414"/>
      <circle cx="32" cy="32" r="28" fill="url(#g1)"/>
      <text x="32" y="40" text-anchor="middle"
            font-family="Georgia, serif" font-style="italic"
            font-size="26" fill="#1DB954"
            filter="drop-shadow(0 0 5px #1DB95488)">𝒮𝒦</text>
    </svg>
  </div>

  <div>
    <p style="color:white; font-size:12px; margin-bottom:8px;">Option 2 — Flowing italic (SK)</p>
    <svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 64 64">
      <defs>
        <radialGradient id="g2" cx="50%" cy="50%" r="60%">
          <stop offset="0%" stop-color="#1DB954" stop-opacity="0.2"/>
          <stop offset="100%" stop-color="#191414" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <rect width="64" height="64" rx="32" fill="#191414"/>
      <circle cx="32" cy="32" r="28" fill="url(#g2)"/>
      <text x="32" y="41" text-anchor="middle"
            font-family="'Times New Roman', serif" font-style="italic" font-weight="bold"
            font-size="30" fill="#1DB954"
            filter="drop-shadow(0 0 6px #1DB95499)">SK</text>
    </svg>
  </div>

  <div>
    <p style="color:white; font-size:12px; margin-bottom:8px;">Option 3 — Rounded square + swirl</p>
    <svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 64 64">
      <defs>
        <radialGradient id="g3" cx="50%" cy="50%" r="60%">
          <stop offset="0%" stop-color="#1DB954" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="#191414" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <rect width="64" height="64" rx="20" fill="#191414"/>
      <circle cx="32" cy="32" r="28" fill="url(#g3)"/>
      <text x="32" y="41" text-anchor="middle"
            font-family="Palatino, 'Book Antiqua', serif" font-style="italic"
            font-size="28" fill="#1DB954"
            filter="drop-shadow(0 0 6px #1DB95499)">𝒮𝒦</text>
    </svg>
  </div>

</body>
</html>
